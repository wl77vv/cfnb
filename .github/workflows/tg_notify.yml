name: TG Notification

'on':
  push:
    paths:
      - ip.txt
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read IP
        run: |
          echo "### Latest IP" > /tmp/msg.md
          echo '\`\`\`' >> /tmp/msg.md
          cat ip.txt >> /tmp/msg.md || echo "no ip.txt"
          echo '\`\`\`' >> /tmp/msg.md
          echo "" >> /tmp/msg.md
          date >> /tmp/msg.md
          cat /tmp/msg.md

      - name: Send TG
        uses: appleboy/telegram-action@v1.1.0
        with:
          to: ${{ secrets.TG_CHAT_ID }}
          token: ${{ secrets.TG_BOT_TOKEN }}
          message_file: /tmp/msg.md
          format: markdown
