name: TG通知 - IP优选更新

on:
  push:
    paths:
      - 'ip.txt'
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: 读取最新IP
        run: |
          echo "### 最新优选IP" > /tmp/msg.md
          echo '```' >> /tmp/msg.md
          cat ip.txt >> /tmp/msg.md || echo "no ip.txt"
          echo '```' >> /tmp/msg.md
          echo "" >> /tmp/msg.md
          echo "更新时间: $(date)" >> /tmp/msg.md
          cat /tmp/msg.md

      - name: 发送TG通知
        uses: appleboy/telegram-action@v1.1.0
        with:
          to: ${{ secrets.TG_CHAT_ID }}
          token: ${{ secrets.TG_BOT_TOKEN }}
          message_file: /tmp/msg.md
          format: markdown
